<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration - Livingstone International School</title>
    <style>
        :root { --primary: #2c3e50; --accent: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; height: 100vh; background: var(--primary); color: white; position: fixed; padding: 20px; }
        .main-content { margin-left: 290px; padding: 40px; width: 100%; max-width: 900px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #555; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .photo-upload-box { grid-column: span 2; display: flex; align-items: center; gap: 20px; background: #f9f9f9; padding: 20px; border: 1px dashed #ccc; border-radius: 8px; }
        .btn-submit { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Livingstone Int.</h3>
        <p>Admin Panel</p>
        <hr>
        <p><a href="admin_dashboard.html" style="color: white; text-decoration: none;">🏠 Dashboard</a></p>
    </div>

    <div class="main-content">
        <div class="form-card">
            <h2>👨‍🏫 Staff Registration</h2>
            <form id="staffForm">
                <div class="form-grid">
                    <div class="photo-upload-box">
                        <div style="width: 100px; height: 100px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--accent);">
                            <img id="staff-preview" src="https://via.placeholder.com/100" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div>
                            <label>Staff Profile Picture</label>
                            <input type="file" accept="image/*">
                            <button type="button" style="margin-top: 5px; font-size: 0.8rem;" onclick="alert('Webcam Ready...')">📸 Take Snapshot</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="e.g. Dr. Eric Smith" required>
                    </div>
                    <div class="form-group">
                        <label>Designation</label>
                        <select>
                            <option>Senior Teacher</option>
                            <option>Assistant Teacher</option>
                            <option>Accountant</option>
                            <option>Lab Assistant</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select>
                            <option>Science</option>
                            <option>Mathematics</option>
                            <option>Languages</option>
                            <option>Finance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" placeholder="LIS-STAFF-001" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Register Staff Member</button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Livingstone International School</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        h2 { margin-bottom: 25px; color: #7f8c8d; font-weight: 400; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #34495e; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #2980b9; }
        .error { color: #e74c3c; margin-top: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo"> Livingstone International School </div>
        <h2>Portal Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@livingstone.edu" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Log In</button>
            <div id="errorMessage" class="error">Invalid email or password.</div>
        </form>

        <p style="margin-top: 20px; font-size: 0.8rem; color: #95a5a6;">
            Forgot password? Contact the System Administrator.
        </p>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                // REAL API CALL
                const result = await api.post('/login', { email, password });

                if (result.token) {
                    // Store the security token and role
                    localStorage.setItem('livingstone_token', result.token);
                    localStorage.setItem('user_role', result.role);
                    
                    alert('Login Successful! Redirecting...');
                    window.location.href = result.redirectUrl; 
                } else {
                    errorDiv.textContent = result.message || "Invalid Login";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = "Server error. Please try again later.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
